<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GenZ Dictionary — ask the group chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #EFEAFF;
    --panel: #FBFAFF;
    --ink: #1B1633;
    --muted: #6E6690;
    --sent: #6C4CFF;
    --sent-text: #FFFFFF;
    --recv: #FFFFFF;
    --recv-border: #E3DDFB;
    --accent: #FF4F81;
    --accent-2: #FFC24C;
    --line: #DED6FB;
    --radius: 20px;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    background-image:
      radial-gradient(circle at 8% 12%, rgba(108,76,255,0.10), transparent 40%),
      radial-gradient(circle at 92% 85%, rgba(255,79,129,0.10), transparent 40%);
    color: var(--ink);
    font-family: 'Inter', -apple-system, sans-serif;
    min-height: 100vh;
  }

  .phone-shell {
    max-width: 640px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 28px 20px 16px;
    text-align: center;
  }

  .status-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--panel);
    border: 1px solid var(--line);
    padding: 5px 12px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 0.02em;
    margin-bottom: 14px;
  }
  .status-pill .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #38C172;
    box-shadow: 0 0 0 3px rgba(56,193,114,0.18);
  }

  h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: clamp(28px, 6vw, 40px);
    line-height: 1.05;
    margin: 0 0 6px;
    letter-spacing: -0.01em;
  }
  h1 span { color: var(--sent); }

  .subtitle {
    color: var(--muted);
    font-size: 15px;
    max-width: 46ch;
    margin: 0 auto;
  }

  /* Category chip rail */
  .chip-rail {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding: 18px 20px 6px;
    scrollbar-width: none;
  }
  .chip-rail::-webkit-scrollbar { display: none; }
  .chip {
    flex: 0 0 auto;
    padding: 8px 14px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 999px;
    font-size: 13px;
    font-weight: 600;
    color: var(--ink);
    cursor: pointer;
    white-space: nowrap;
    transition: transform 0.12s ease, background 0.12s ease, color 0.12s ease;
  }
  .chip:hover { transform: translateY(-1px); }
  .chip.active {
    background: var(--ink);
    color: #fff;
    border-color: var(--ink);
  }

  /* Chat log */
  .chat-log {
    flex: 1;
    padding: 10px 20px 8px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    overflow-y: auto;
  }

  .bubble-row { display: flex; }
  .bubble-row.sent { justify-content: flex-end; }
  .bubble-row.recv { justify-content: flex-start; }

  .bubble {
    max-width: 78%;
    padding: 11px 15px;
    border-radius: var(--radius);
    font-size: 15px;
    line-height: 1.42;
    animation: pop 0.22s cubic-bezier(.2,.8,.3,1.2) both;
  }
  @keyframes pop {
    from { opacity: 0; transform: translateY(6px) scale(0.97); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .bubble-row.sent .bubble {
    background: var(--sent);
    color: var(--sent-text);
    border-bottom-right-radius: 6px;
  }
  .bubble-row.recv .bubble {
    background: var(--recv);
    border: 1px solid var(--recv-border);
    border-bottom-left-radius: 6px;
  }

  .bubble .term {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 15px;
    display: block;
    margin-bottom: 2px;
  }
  .bubble .cat-tag {
    display: inline-block;
    margin-top: 8px;
    font-size: 11px;
    font-weight: 600;
    color: var(--sent);
    background: rgba(108,76,255,0.08);
    padding: 3px 9px;
    border-radius: 999px;
  }
  .bubble .suggest-btn {
    display: inline-block;
    margin: 6px 6px 0 0;
    padding: 5px 11px;
    background: rgba(108,76,255,0.08);
    border: 1px solid var(--line);
    border-radius: 999px;
    font-size: 12px;
    font-weight: 600;
    color: var(--sent);
    cursor: pointer;
  }
  .bubble .suggest-btn:hover { background: rgba(108,76,255,0.16); }

  .typing .dots { display: inline-flex; gap: 3px; align-items: center; height: 14px; }
  .typing .dots span {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--muted);
    animation: bounce 1.1s infinite ease-in-out;
  }
  .typing .dots span:nth-child(2) { animation-delay: 0.15s; }
  .typing .dots span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
    30% { transform: translateY(-4px); opacity: 1; }
  }

  .empty-state {
    text-align: center;
    color: var(--muted);
    font-size: 14px;
    padding: 30px 20px;
  }

  /* Composer */
  .composer {
    position: sticky;
    bottom: 0;
    background: linear-gradient(180deg, rgba(239,234,255,0) 0%, var(--bg) 30%);
    padding: 10px 20px 18px;
  }
  .composer-inner {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 6px 6px 6px 18px;
    box-shadow: 0 10px 30px rgba(27,22,51,0.08);
  }
  #wordInput {
    flex: 1;
    border: none;
    outline: none;
    background: transparent;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    color: var(--ink);
    padding: 8px 0;
  }
  #wordInput::placeholder { color: var(--muted); }

  #sendBtn {
    flex: 0 0 auto;
    width: 40px; height: 40px;
    border-radius: 50%;
    border: none;
    background: var(--sent);
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: transform 0.12s ease, background 0.12s ease;
  }
  #sendBtn:hover { transform: scale(1.05); background: #5B3CF0; }
  #sendBtn svg { width: 17px; height: 17px; }

  .composer-hint {
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    margin-top: 10px;
  }
  .composer-hint button {
    border: none;
    background: none;
    color: var(--accent);
    font-weight: 700;
    cursor: pointer;
    font-size: 12px;
    padding: 0;
  }

  /* Archive / browse-all section */
  .archive {
    max-width: 640px;
    margin: 6px auto 60px;
    padding: 0 20px;
  }
  .archive-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin: 26px 0 12px;
  }
  .archive-header h2 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 18px;
    margin: 0;
  }
  .archive-header span { font-size: 12px; color: var(--muted); }

  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 10px;
  }

  .flip-card {
    perspective: 800px;
    height: 92px;
    cursor: pointer;
  }
  .flip-inner {
    position: relative;
    width: 100%; height: 100%;
    transition: transform 0.5s cubic-bezier(.2,.8,.2,1);
    transform-style: preserve-3d;
  }
  .flip-card.flipped .flip-inner { transform: rotateY(180deg); }
  .flip-front, .flip-back {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    border-radius: 14px;
    padding: 10px 12px;
    display: flex;
    align-items: center;
    font-size: 13px;
    line-height: 1.3;
    border: 1px solid var(--line);
  }
  .flip-front {
    background: var(--panel);
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    color: var(--ink);
  }
  .flip-back {
    background: var(--ink);
    color: #fff;
    transform: rotateY(180deg);
    font-weight: 500;
    border-color: var(--ink);
  }

  footer {
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    padding: 0 20px 40px;
  }

  @media (prefers-reduced-motion: reduce) {
    * { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
  }
</style>
</head>
<body>

<div class="phone-shell">
  <header>
    <div class="status-pill"><span class="dot"></span> GenZ Dictionary is online</div>
    <h1>ask the <span>group chat</span></h1>
    <p class="subtitle">Text it a word you don't understand. It'll text back the millennial translation — no cap.</p>
  </header>

  <div class="chip-rail" id="chipRail"></div>

  <main class="chat-log" id="chatLog">
    <div class="empty-state" id="emptyState">Type a word below — or tap "surprise me" — to start the conversation.</div>
  </main>

  <div class="composer">
    <div class="composer-inner">
      <input type="text" id="wordInput" placeholder="Enter a GenZ word..." autocomplete="off">
      <button id="sendBtn" onclick="searchWord()" aria-label="Send">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg>
      </button>
    </div>
    <p class="composer-hint">or <button onclick="surpriseMe()">surprise me 🎲</button></p>
  </div>
</div>

<div class="archive" id="archive"></div>

<footer>259 terms, translated. Half of them will be dead by next year — very on brand.</footer>

m":"Say less","meaning":"I understand, no need to explain more","category":"Reactions / Exclamations"},{"term":"Deadass","meaning":"Seriously, for real","category":"Reactions / Exclamations"},{"term":"Fr / fr fr","meaning":"For real / for real for real","category":"Reactions / Exclamations"},{"term":"Facts","meaning":"I agree, that's true","category":"Reactions / Exclamations"},{"term":"Периодt / Period(t)","meaning":"End of discussion, that's final","category":"Reactions / Exclamations"},{"term":"Slay","meaning":"You did great / go for it","category":"Reactions / Exclamations"},{"term":"I'm dead / I'm deceased","meaning":"That's hilarious","category":"Reactions / Exclamations"},{"term":"I can't","meaning":"I'm overwhelmed (usually by humor)","category":"Reactions / Exclamations"},{"term":"Screaming","meaning":"Reacting with intense laughter/shock","category":"Reactions / Exclamations"},{"term":"Crying","meaning":"Same as above, laughing hard","category":"Reactions / Exclamations"},{"term":"Weak (from laughing)","meaning":"Laughing so hard you're weak","category":"Reactions / Exclamations"},{"term":"Not me [doing X]","meaning":"Self-deprecating admission","category":"Reactions / Exclamations"},{"term":"The way [X]","meaning":"Emphasizing how something happened","category":"Reactions / Exclamations"},{"term":"Lowkey","meaning":"Kind of, secretly","category":"Reactions / Exclamations"},{"term":"Highkey","meaning":"Very much, openly","category":"Reactions / Exclamations"},{"term":"Big mood","meaning":"Strongly relatable feeling","category":"Reactions / Exclamations"},{"term":"Same energy","meaning":"Comparable vibe/attitude","category":"Reactions / Exclamations"},{"term":"It's the [X] for me","meaning":"The specific thing that stands out","category":"Reactions / Exclamations"},{"term":"Living for this","meaning":"Loving this","category":"Reactions / Exclamations"},{"term":"Obsessed","meaning":"Really into something","category":"Reactions / Exclamations"},{"term":"Devas const chatLog = document.getElementById('chatLog');
const emptyState = document.getElementById('emptyState');
const wordInput = document.getElementById('wordInput');
const chipRail = document.getElementById('chipRail');
const archive = document.getElementById('archive');

const CATEGORY_SHORT = {
  'Approval / Compliments ("this is good")': 'Approval',
  'Disapproval / Insults ("this is bad / you\'re annoying")': 'Disapproval',
  'Reactions / Exclamations': 'Reactions',
  'Internet / Texting Shorthand': 'Internet & Texting',
  'Money / Ambition': 'Money & Ambition',
  'Relationships / Social Dynamics': 'Relationships',
  'General Filler / Everyday Use': 'Everyday Filler'
};

function normalize(s) {
  return s.toLowerCase().replace(/[^a-z0-9\s]/g, '').trim();
}

function findMatches(query) {
  const q = normalize(query);
  if (!q) return { exact: [], partial: [] };
  const exact = GLOSSARY.filter(e => normalize(e.term) === q);
  const partial = GLOSSARY.filter(e =>
    normalize(e.term) !== q &&
    (normalize(e.term).includes(q) || normalize(e.meaning).includes(q))
  ).slice(0, 5);
  return { exact, partial };
}

function addBubble(role, contentHTML, opts) {
  opts = opts || {};
  const row = document.createElement('div');
  row.className = 'bubble-row ' + role;
  const bubble = document.createElement('div');
  bubble.className = 'bubble' + (opts.typing ? ' typing' : '');
  bubble.innerHTML = contentHTML;
  row.appendChild(bubble);
  chatLog.appendChild(row);
  chatLog.scrollTop = chatLog.scrollHeight;
  return row;
}

function escapeHTML(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function respond(query) {
  emptyState.style.display = 'none';

  const typingRow = addBubble('recv', '<span class="dots"><span></span><span></span><span></span></span>', { typing: true });

  setTimeout(() => {
    typingRow.remove();
    const { exact, partial } = findMatches(query);

    if (exact.length) {
      const html = exact.map(e => (
        '<span class="term">' + escapeHTML(e.term) + '</span>' +
        escapeHTML(e.meaning) +
        '<span class="cat-tag">' + escapeHTML(CATEGORY_SHORT[e.category] || e.category) + '</span>'
      )).join('<hr style="border:none;border-top:1px solid var(--line);margin:10px 0;">');
      addBubble('recv', html);
    } else if (partial.length) {
      const chips = partial.map(e =>
        '<span class="suggest-btn" onclick="sendFromChip(this)" data-term="' + escapeHTML(e.term) + '">' + escapeHTML(e.term) + '</span>'
      ).join('');
      addBubble('recv',
        'never heard of "<b>' + escapeHTML(query) + '</b>" exactly, but did you mean:<br>' + chips
      );
    } else {
      addBubble('recv', 'ngl that one\'s not in my brain 💀 try browsing the full glossary below.');
    }
  }, 520 + Math.random() * 380);
}

function sendFromChip(el) {
  const term = el.getAttribute('data-term');
  wordInput.value = term;
  searchWord();
}

function searchWord() {
  const val = wordInput.value.trim();
  if (!val) return;
  addBubble('sent', escapeHTML(val));
  wordInput.value = '';
  respond(val);
}

function surpriseMe() {
  const pick = GLOSSARY[Math.floor(Math.random() * GLOSSARY.length)];
  wordInput.value = pick.term.replace(/\s*\/.*/, '');
  searchWord();
}

wordInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') searchWord();
});

// Category chips
function buildChips() {
  const categories = [...new Set(GLOSSARY.map(e => e.category))];
  const allChip = document.createElement('div');
  allChip.className = 'chip active';
  allChip.textContent = 'All';
  allChip.onclick = () => setActiveChip(allChip, null);
  chipRail.appendChild(allChip);

  categories.forEach(cat => {
    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.textContent = CATEGORY_SHORT[cat] || cat;
    chip.onclick = () => setActiveChip(chip, cat);
    chipRail.appendChild(chip);
  });
}

function setActiveChip(chipEl, category) {
  [...chipRail.children].forEach(c => c.classList.remove('active'));
  chipEl.classList.add('active');
  renderArchive(category);
  chipEl.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
}

// Archive / flip-card browser
function renderArchive(filterCategory) {
  archive.innerHTML = '';
  const categories = filterCategory ? [filterCategory] : [...new Set(GLOSSARY.map(e => e.category))];

  categories.forEach(cat => {
    const items = GLOSSARY.filter(e => e.category === cat);
    const section = document.createElement('section');

    const headerHTML = document.createElement('div');
    headerHTML.className = 'archive-header';
    headerHTML.innerHTML = '<h2>' + escapeHTML(cat) + '</h2><span>' + items.length + ' terms</span>';
    section.appendChild(headerHTML);

    const grid = document.createElement('div');
    grid.className = 'card-grid';

    items.forEach(e => {
      const card = document.createElement('div');
      card.className = 'flip-card';
      card.innerHTML =
        '<div class="flip-inner">' +
          '<div class="flip-front">' + escapeHTML(e.term) + '</div>' +
          '<div class="flip-back">' + escapeHTML(e.meaning) + '</div>' +
        '</div>';
      card.addEventListener('click', () => card.classList.toggle('flipped'));
      grid.appendChild(card);
    });

    section.appendChild(grid);
    archive.appendChild(section);
  });
}

buildChips();
renderArchive(null);
</script>
